<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mini. | Front-End Code Minifier</title>
    <meta name="description"
        content="mini. is the ultimate desktop-optimized code minifier for HTML, CSS, JavaScript, and JSON. Minify, compress, and optimize your front-end code instantly.">
    <meta name="keywords"
        content="minifier, code compressor, html minifier, css minifier, js minifier, json minifier, web development tool, optimization, reduce file size">
    <meta name="author" content="mini. App">
    <meta name="robots" content="index, follow">
    <meta name="theme-color" content="#000000">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://ayqshi.github.io/mini.">
    <meta property="og:title" content="mini. | Minimalist Code Minifier">
    <meta property="og:description"
        content="Strip, compress, and optimize. The professional choice for front-end code minification.">
    <meta property="og:image" content="">
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://mini.app/">
    <meta property="twitter:title" content="mini. | Code Minifier">
    <meta property="twitter:description"
        content="Strip, compress, and optimize. The professional choice for front-end code minification.">
    <meta property="twitter:image" content="">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="styles.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script> tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'], }, colors: { mono: { 50: '#f9fafb', 100: '#f3f4f6', 200: '#e5e7eb', 300: '#d1d5db', 400: '#9ca3af', 500: '#6b7280', 600: '#4b5563', 700: '#374151', 800: '#1f2937', 900: '#111827', 950: '#030712', } }, animation: { 'fade-in': 'fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards', 'slide-up': 'slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards', 'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite', 'spin-slow': 'spin 1.5s linear infinite', }, keyframes: { fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' }, }, slideUp: { '0%': { opacity: '0', transform: 'translateY(20px)' }, '100%': { opacity: '1', transform: 'translateY(0)' }, } } } } } </script>
</head>

<body
    class="bg-mono-50 text-mono-900 font-sans h-screen flex flex-col overflow-hidden selection:bg-mono-900 selection:text-white">
    <div id="toast-container" class="fixed top-5 right-5 z-50 flex flex-col gap-2 pointer-events-none"></div>
    <div id="processing-overlay"
        class="absolute inset-0 bg-white/80 backdrop-blur-sm z-40 flex flex-col items-center justify-center hidden opacity-0 transition-opacity duration-300">
        <div class="loader-dots relative w-[80px] h-[20px]">
            <div class="absolute top-0 w-4 h-4 rounded-full bg-mono-900"></div>
            <div class="absolute top-0 w-4 h-4 rounded-full bg-mono-900"></div>
            <div class="absolute top-0 w-4 h-4 rounded-full bg-mono-900"></div>
            <div class="absolute top-0 w-4 h-4 rounded-full bg-mono-900"></div>
        </div>
        <p class="mt-4 text-sm font-medium tracking-widest uppercase text-mono-500 animate-pulse">Minimizing</p>
    </div>
    <header
        class="h-16 border-b border-mono-200 bg-white flex items-center justify-between px-6 shrink-0 animate-fade-in z-10">
        <div class="flex items-center gap-3">
            <div class="w-6 h-6 bg-mono-900 rounded-sm"></div>
            <h1 class="text-xl font-semibold tracking-tight">mini<span class="text-mono-400">.</span></h1>
        </div>
        <nav class="flex items-center gap-1 bg-mono-100 p-1 rounded-lg"> <button onclick="switchMode('html')"
                id="btn-html"
                class="lang-btn px-4 py-1.5 text-sm font-medium rounded-md transition-all duration-200">HTML</button>
            <button onclick="switchMode('css')" id="btn-css"
                class="lang-btn px-4 py-1.5 text-sm font-medium rounded-md transition-all duration-200">CSS</button>
            <button onclick="switchMode('js')" id="btn-js"
                class="lang-btn px-4 py-1.5 text-sm font-medium rounded-md transition-all duration-200">JS</button>
            <button onclick="switchMode('json')" id="btn-json"
                class="lang-btn px-4 py-1.5 text-sm font-medium rounded-md transition-all duration-200">JSON</button>
        </nav>
        <div class="flex items-center gap-4"> <button onclick="toggleSettings()"
                class="text-mono-400 hover:text-mono-900 transition-colors" title="Settings"> <svg
                    xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path
                        d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.09a2 2 0 0 1-1-1.74v-.47a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.39a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z" />
                    <circle cx="12" cy="12" r="3" />
                </svg> </button> <a href="https://github.com/ayqshi/mini." target="_blank"
                class="text-mono-400 hover:text-mono-900 transition-colors"> <svg xmlns="http://www.w3.org/2000/svg"
                    width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path
                        d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4" />
                    <path d="M9 18c-4.51 2-5-2-7-2" />
                </svg> </a> </div>
    </header>
    <div id="settings-panel" class="bg-mono-900 text-white h-0 overflow-hidden transition-all duration-300 ease-in-out">
        <div class="px-6 py-4 flex flex-wrap gap-8 items-center border-b border-mono-800">
            <div class="flex flex-col gap-2"> <span
                    class="text-xs font-bold text-mono-500 uppercase tracking-widest">Options</span> <label
                    class="flex items-center gap-2 cursor-pointer select-none"> <input type="checkbox"
                        id="opt-remove-comments" checked class="accent-mono-50 w-4 h-4"> <span
                        class="text-sm font-medium">Strip Comments</span> </label> <label
                    class="flex items-center gap-2 cursor-pointer select-none"> <input type="checkbox"
                        id="opt-collapse-whitespace" checked class="accent-mono-50 w-4 h-4"> <span
                        class="text-sm font-medium">Collapse Whitespace</span> </label> </div>
            <div class="flex flex-col gap-2"> <span
                    class="text-xs font-bold text-mono-500 uppercase tracking-widest">Advanced</span> <label
                    class="flex items-center gap-2 cursor-pointer select-none"> <input type="checkbox"
                        id="opt-mangle-vars" class="accent-mono-50 w-4 h-4"> <span class="text-sm font-medium">Mangle
                        Variables (JS Only)</span> </label> </div>
            <div class="ml-auto"> <button onclick="toggleSettings()"
                    class="text-xs text-mono-500 hover:text-white underline underline-offset-4">Close</button> </div>
        </div>
    </div>
    <main class="flex-1 flex overflow-hidden animate-slide-up">
        <section class="flex-1 flex flex-col border-r border-mono-200 relative group min-w-[300px]">
            <div class="h-10 bg-mono-50 border-b border-mono-200 flex items-center justify-between px-4 shrink-0"> <span
                    class="text-xs font-bold text-mono-400 uppercase tracking-widest">Input</span>
                <div class="flex gap-2 opacity-0 group-hover:opacity-100 transition-opacity"> <button
                        onclick="pasteFromClipboard()" class="text-mono-400 hover:text-mono-900" title="Paste"> <svg
                            xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2" />
                            <rect x="8" y="2" width="8" height="4" rx="1" ry="1" />
                        </svg> </button> <button onclick="clearInput()" class="text-mono-400 hover:text-red-600"
                        title="Clear"> <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16"
                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <path d="M18 6 6 18" />
                            <path d="m6 6 12 12" />
                        </svg> </button> </div>
            </div>
            <div class="flex-1 relative bg-white highlight-border"> <textarea id="input-code"
                    class="editor-textarea w-full h-full p-4 font-mono text-sm text-mono-700 bg-transparent border-none"
                    placeholder="Paste your code here..." spellcheck="false"></textarea> </div>
            <div
                class="h-8 bg-mono-50 border-t border-mono-200 flex items-center px-4 justify-between text-xs text-mono-400 shrink-0">
                <span id="input-stats">0 chars</span> <span id="lang-indicator"
                    class="font-medium text-mono-900">HTML</span> </div>
        </section>
        <div
            class="w-16 bg-mono-50 border-r border-mono-200 flex flex-col items-center justify-center gap-6 shrink-0 z-20">
            <button onclick="runMinification()"
                class="w-10 h-10 rounded-full bg-mono-900 text-white flex items-center justify-center shadow-lg hover:scale-110 hover:bg-black transition-all duration-200 group"
                title="Minify (Ctrl+Enter)"> <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20"
                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round" class="group-hover:-translate-x-0.5 transition-transform">
                    <path d="m9 18 6-6-6-6" />
                </svg> <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                    class="group-hover:translate-x-0.5 transition-transform">
                    <path d="m15 18-6-6 6-6" />
                </svg> </button>
            <div class="h-12 w-px bg-mono-300"></div>
            <div class="flex flex-col items-center gap-1 select-none"> <span
                    class="text-[9px] font-bold text-mono-400 uppercase tracking-wider">Live</span> <button
                    onclick="toggleLiveMode()" id="btn-live"
                    class="w-10 h-6 bg-mono-200 rounded-full p-0.5 transition-colors duration-200 ease-in-out relative"
                    title="Toggle Live Mode">
                    <div id="btn-live-dot"
                        class="w-4 h-4 bg-white rounded-full shadow-sm transition-transform duration-200 ease-in-out transform translate-x-0">
                    </div>
                </button> </div>
            <div class="h-12 w-px bg-mono-300"></div> <button onclick="copyResult()"
                class="text-mono-400 hover:text-mono-900 transition-colors" title="Copy Result"> <svg
                    xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect width="14" height="14" x="8" y="8" rx="2" ry="2" />
                    <path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2" />
                </svg> </button>
        </div>
        <section class="flex-1 flex flex-col relative min-w-[300px]">
            <div class="h-10 bg-mono-50 border-b border-mono-200 flex items-center justify-between px-4 shrink-0"> <span
                    class="text-xs font-bold text-mono-400 uppercase tracking-widest">Output</span>
                <div class="text-xs font-mono text-mono-900 font-bold" id="savings-tag"></div>
            </div>
            <div class="flex-1 relative bg-mono-50/50"> <textarea id="output-code" readonly
                    class="editor-textarea w-full h-full p-4 font-mono text-sm text-mono-800 bg-transparent border-none cursor-text"
                    spellcheck="false"></textarea> </div>
            <div
                class="h-8 bg-mono-50 border-t border-mono-200 flex items-center px-4 justify-between text-xs text-mono-400 shrink-0">
                <span id="output-stats">0 chars</span> <span class="text-[10px] uppercase text-mono-300">Ready</span>
            </div>
        </section>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/clean-css@5.3.3/lib/clean.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/terser/dist/bundle.min.js"></script>
    <script src="main.js"></script>
</body>

</html>
